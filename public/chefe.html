<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Chefe de Equipe — CheckViatura</title>
<style>
:root{
  --azul:#E8520A;--azul2:#C43D00;--azul-claro:#FFF0E8;--azul-borda:#F47B3A;
  --verde:#2D7D32;--verde-claro:#E8F5E9;
  --vermelho:#9B1C1C;--vermelho-claro:#FEE2E2;
  --cinza:#6B7280;--cinza-claro:#F9F5F2;--cinza-borda:#E2D5CC;
  --texto:#1A0A00;--texto-sec:#6B5A52;--branco:#fff;--bg:#FBF5F0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;}
header{background:linear-gradient(135deg,#C43D00,#E8520A);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;}
.header-badge{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 12px;font-size:12px;}
.container{max-width:900px;margin:0 auto;padding:20px;}
.card{background:var(--branco);border:1px solid var(--cinza-borda);border-radius:12px;padding:24px;margin-bottom:16px;}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--texto);}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.form-group label{font-size:11px;font-weight:700;color:var(--texto-sec);text-transform:uppercase;letter-spacing:.4px;}
.form-group input,.form-group select{padding:10px 12px;border:1px solid var(--cinza-borda);border-radius:8px;font-size:14px;color:var(--texto);background:var(--branco);font-family:inherit;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--azul-borda);}
.btn{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s;}
.btn-primary{background:var(--azul);color:#fff;}
.btn-primary:hover{background:var(--azul2);}
.btn-success{background:var(--verde);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--cinza-borda);color:var(--texto);}
.btn-outline:hover{background:var(--cinza-claro);}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-ok{background:var(--verde-claro);color:var(--verde);}
.badge-nc{background:var(--vermelho-claro);color:var(--vermelho);}
.badge-pendente{background:#FEF3C7;color:#92400E;}
.badge-assinado{background:#E8F5E9;color:#2D7D32;}
.checklist-item{background:var(--branco);border:1px solid var(--cinza-borda);border-radius:10px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .15s;}
.checklist-item:hover{border-color:var(--azul-borda);box-shadow:0 2px 8px rgba(232,82,10,.1);}
.checklist-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.checklist-title{font-size:14px;font-weight:700;}
.checklist-meta{font-size:12px;color:var(--texto-sec);margin-top:4px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--branco);border-radius:14px;padding:26px;max-width:700px;width:95%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.sig-canvas-wrap{border:1.5px dashed var(--cinza-borda);border-radius:8px;background:#FAFAF8;}
canvas.sig-canvas{display:block;width:100%;height:120px;cursor:crosshair;touch-action:none;}
.sig-clear{font-size:11px;color:var(--texto-sec);cursor:pointer;background:none;border:none;padding:4px 0;text-align:right;display:block;}
.nc-item{padding:6px 10px;background:var(--vermelho-claro);border-radius:6px;font-size:12px;color:var(--vermelho);margin-bottom:4px;}
.login-box{max-width:400px;margin:80px auto;}
.equipe-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;background:var(--azul-claro);color:var(--azul);margin-bottom:16px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.alert-error{background:var(--vermelho-claro);color:var(--vermelho);}
.alert-success{background:var(--verde-claro);color:var(--verde);}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="font-size:22px;font-weight:900;color:#fff;">med+</div>
    <div>
      <div style="font-size:10px;color:rgba(255,255,255,.75);letter-spacing:1px;margin-bottom:1px;">med+ Group</div>
      <div style="font-size:16px;font-weight:800;letter-spacing:.5px;">Portal do Chefe de Equipe</div>
    </div>
  </div>
  <div class="header-badge" id="hdr-info" style="display:none;"></div>
</header>

<!-- TELA DE LOGIN -->
<div class="container" id="tela-login">
  <div class="login-box">
    <div class="card">
      <div class="card-title">🔐 Acesso do Chefe de Equipe</div>
      <div id="login-error" class="alert alert-error" style="display:none;"></div>
      <div class="form-group">
        <label>Equipe</label>
        <select id="login-equipe">
          <option value="">Selecione sua equipe...</option>
          <option value="Alfa">Alfa — Chefe: Cerqueira</option>
          <option value="Bravo">Bravo — Chefe: Savio</option>
          <option value="Charlie">Charlie — Chefe: Cleber</option>
          <option value="Delta">Delta — Chefe: Douglas</option>
        </select>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="Digite sua senha">
      </div>
      <button class="btn btn-primary" onclick="fazerLogin()" style="width:100%;">Entrar</button>
      <div style="margin-top:12px;text-align:center;">
        <a href="/" style="font-size:12px;color:var(--texto-sec);">← Voltar ao CheckViatura</a>
      </div>
    </div>
  </div>
</div>

<!-- TELA PRINCIPAL -->
<div class="container" id="tela-principal" style="display:none;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
    <div>
      <div style="font-size:20px;font-weight:700;" id="titulo-equipe">Equipe —</div>
      <div style="font-size:13px;color:var(--texto-sec);" id="subtitulo-chefe"></div>
    </div>
    <button class="btn btn-outline" onclick="sair()">Sair</button>
  </div>

  <div id="lista-checklists"></div>
</div>

<!-- MODAL CHECKLIST -->
<div class="modal-overlay" id="modal-checklist">
  <div class="modal">
    <div class="modal-title" id="modal-titulo">Checklist</div>
    <div id="modal-conteudo"></div>
    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="fecharModal()">Fechar</button>
      <button class="btn btn-success" id="btn-assinar" onclick="assinarChecklist()">✍️ Assinar e Aprovar</button>
    </div>
  </div>
</div>

<script>
const SENHAS = {
  Alfa: 'alfa123',
  Bravo: 'bravo123',
  Charlie: 'charlie123',
  Delta: 'delta123'
};

const CHEFES = {
  Alfa: 'Cerqueira',
  Bravo: 'Savio',
  Charlie: 'Cleber',
  Delta: 'Douglas'
};

let equipeLogada = null;
let checklistAtual = null;

function fazerLogin() {
  const equipe = document.getElementById('login-equipe').value;
  const senha = document.getElementById('login-senha').value;
  const erro = document.getElementById('login-error');

  if (!equipe) { erro.textContent = 'Selecione sua equipe.'; erro.style.display='block'; return; }
  if (!senha) { erro.textContent = 'Digite sua senha.'; erro.style.display='block'; return; }
  if (SENHAS[equipe] !== senha) { erro.textContent = 'Senha incorreta.'; erro.style.display='block'; return; }

  equipeLogada = equipe;
  erro.style.display = 'none';
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('tela-principal').style.display = 'block';
  document.getElementById('titulo-equipe').textContent = `Equipe ${equipe}`;
  document.getElementById('subtitulo-chefe').textContent = `Chefe: ${CHEFES[equipe]} — Checklists para revisão`;
  document.getElementById('hdr-info').textContent = `${equipe} — ${CHEFES[equipe]}`;
  document.getElementById('hdr-info').style.display = 'block';
  carregarChecklists();
}

async function carregarChecklists() {
  const lista = document.getElementById('lista-checklists');
  lista.innerHTML = '<div style="text-align:center;padding:40px;color:var(--texto-sec);">Carregando...</div>';

  try {
    const r = await fetch('/api/checklists/publico?equipe='+equipeLogada);
    const todos = await r.json();
    const meus = todos.filter(c => c.equipe === equipeLogada);

    if (meus.length === 0) {
      lista.innerHTML = '<div class="card" style="text-align:center;padding:40px;color:var(--texto-sec);">Nenhum checklist encontrado para sua equipe.</div>';
      return;
    }

    lista.innerHTML = meus.sort((a,b) => new Date(b.data) - new Date(a.data)).map(c => {
      const assinado = c.assinatura_chefe_aprovado;
      const statusBadge = assinado
        ? '<span class="badge badge-assinado">✅ Aprovado</span>'
        : c.nc > 0
          ? `<span class="badge badge-nc">⚠ ${c.nc} NC</span>`
          : '<span class="badge badge-ok">✓ Conforme</span>';

      return `<div class="checklist-item" onclick="abrirChecklist('${c.id}')">
        <div class="checklist-header">
          <div>
            <div class="checklist-title">${c.formulario_titulo}</div>
            <div class="checklist-meta">📅 ${c.data} • 🚑 ${c.placa} — ${c.modelo} • 👤 ${c.nome}</div>
          </div>
          ${statusBadge}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    lista.innerHTML = '<div class="alert alert-error">Erro ao carregar checklists.</div>';
  }
}

async function abrirChecklist(id) {
  const r = await fetch('/api/checklists');
  const todos = await r.json();
  checklistAtual = todos.find(c => c.id == id);
  if (!checklistAtual) return;

  document.getElementById('modal-titulo').textContent = checklistAtual.formulario_titulo;

  const ncs = Object.values(checklistAtual.itens || {}).filter(i => i.status === 'NC');
  const total = Object.values(checklistAtual.itens || {}).length;
  const conformes = Object.values(checklistAtual.itens || {}).filter(i => i.status === 'C').length;

  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;font-size:13px;">
      <div><strong>Viatura:</strong> ${checklistAtual.placa} — ${checklistAtual.modelo}</div>
      <div><strong>Data:</strong> ${checklistAtual.data}</div>
      <div><strong>Preenchido por:</strong> ${checklistAtual.nome}</div>
      <div><strong>Equipe:</strong> ${checklistAtual.equipe}</div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <span class="badge badge-ok">✓ ${conformes} Conformes</span>
      <span class="badge badge-nc">⚠ ${ncs.length} Não Conformes</span>
      <span class="badge" style="background:#E8ECF4;color:#374151;">${total} Total</span>
    </div>`;

  if (ncs.length > 0) {
    html += `<div style="margin-bottom:16px;"><strong style="font-size:13px;">Itens Não Conformes:</strong><div style="margin-top:8px;">`;
    ncs.forEach(nc => {
      html += `<div class="nc-item">⚠ ${nc.num} — ${nc.item}</div>`;
    });
    html += `</div></div>`;
  }

  if (checklistAtual.obs) {
    html += `<div style="margin-bottom:16px;"><strong style="font-size:13px;">Observações:</strong><div style="background:var(--cinza-claro);padding:10px;border-radius:8px;font-size:13px;margin-top:6px;">${checklistAtual.obs}</div></div>`;
  }

  if (checklistAtual.assinatura_chefe_aprovado) {
    html += `<div class="alert alert-success">✅ Este checklist já foi aprovado pelo chefe de equipe.</div>`;
    document.getElementById('btn-assinar').style.display = 'none';
  } else {
    html += `
      <div style="margin-top:16px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;">Assinatura do Chefe de Equipe</div>
        <div class="sig-canvas-wrap"><canvas class="sig-canvas" id="canvas-chefe-aprovacao"></canvas></div>
        <button class="sig-clear" onclick="clearCanvas()">Limpar assinatura</button>
      </div>`;
    document.getElementById('btn-assinar').style.display = 'block';
  }

  document.getElementById('modal-conteudo').innerHTML = html;
  document.getElementById('modal-checklist').classList.add('open');

  if (!checklistAtual.assinatura_chefe_aprovado) {
    setTimeout(() => initCanvas(), 100);
  }
}

function initCanvas() {
  const c = document.getElementById('canvas-chefe-aprovacao');
  if (!c) return;
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = c.offsetWidth * dpr; c.height = 120 * dpr;
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#E8520A'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  let drawing = false, lx, ly;
  function pos(e){ const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e; return [s.clientX-r.left, s.clientY-r.top]; }
  c.onmousedown = e => { drawing=true; [lx,ly]=pos(e); };
  c.ontouchstart = e => { e.preventDefault(); drawing=true; [lx,ly]=pos(e); };
  c.onmousemove = e => { if(!drawing)return; const[x,y]=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.stroke(); [lx,ly]=[x,y]; };
  c.ontouchmove = e => { e.preventDefault(); if(!drawing)return; const[x,y]=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.stroke(); [lx,ly]=[x,y]; };
  ['mouseup','mouseleave','touchend'].forEach(ev => c.addEventListener(ev, ()=>drawing=false));
}

function clearCanvas() {
  const c = document.getElementById('canvas-chefe-aprovacao');
  if (c) c.getContext('2d').clearRect(0,0,c.width,c.height);
}

async function assinarChecklist() {
  const btn = document.getElementById('btn-assinar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Salvando...';

  const c = document.getElementById('canvas-chefe-aprovacao');
  const sig = c ? c.toDataURL() : '';

  try {
    const r = await fetch(`/api/checklists/${checklistAtual.id}/aprovar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chefe: CHEFES[equipeLogada],
        equipe: equipeLogada,
        assinatura_chefe_aprovado: sig,
        aprovado_em: new Date().toISOString()
      })
    });

    if (!r.ok) throw new Error(await r.text());

    fecharModal();
    carregarChecklists();
    alert('✅ Checklist aprovado com sucesso!');
  } catch(e) {
    alert('Erro ao aprovar: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✍️ Assinar e Aprovar';
  }
}

function fecharModal() {
  document.getElementById('modal-checklist').classList.remove('open');
  checklistAtual = null;
}

function sair() {
  equipeLogada = null;
  document.getElementById('tela-login').style.display = 'block';
  document.getElementById('tela-principal').style.display = 'none';
  document.getElementById('hdr-info').style.display = 'none';
  document.getElementById('login-equipe').value = '';
  document.getElementById('login-senha').value = '';
}

document.getElementById('modal-checklist').addEventListener('click', e => {
  if (e.target === e.currentTarget) fecharModal();
});

document.getElementById('login-senha').addEventListener('keypress', e => {
  if (e.key === 'Enter') fazerLogin();
});
</script>
</body>
</html>
