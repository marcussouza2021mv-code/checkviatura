<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portal do Chefe de Equipe — med+ Group</title>
<style>
:root{
  --laranja:#E8520A;--laranja2:#C43D00;--laranja-claro:#FFF0E8;--laranja-borda:#F47B3A;
  --verde:#2D7D32;--verde-claro:#E8F5E9;
  --vermelho:#9B1C1C;--vermelho-claro:#FEE2E2;
  --cinza:#6B7280;--cinza-claro:#F9F5F2;--cinza-borda:#E2D5CC;
  --texto:#1A0A00;--texto-sec:#6B5A52;--branco:#fff;--bg:#FBF5F0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;font-size:16px;}
header{background:linear-gradient(135deg,#C43D00,#E8520A);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.header-logo img{height:36px;object-fit:contain;}
.header-info{flex:1;}
.header-title{font-size:15px;font-weight:800;}
.header-sub{font-size:10px;opacity:.75;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;}
.page{padding:16px;max-width:600px;margin:0 auto;}
.card{background:var(--branco);border:1px solid var(--cinza-borda);border-radius:12px;padding:16px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-group label{font-size:12px;font-weight:700;color:var(--texto-sec);text-transform:uppercase;letter-spacing:.4px;}
.form-group input,.form-group select{padding:12px 14px;border:1.5px solid var(--cinza-borda);border-radius:10px;font-size:16px;color:var(--texto);background:var(--branco);font-family:inherit;-webkit-appearance:none;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--laranja-borda);}
.btn{padding:14px 22px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .12s;width:100%;display:block;text-align:center;}
.btn-primary{background:var(--laranja);color:#fff;}
.btn-primary:active{background:var(--laranja2);}
.btn-outline{background:transparent;border:1.5px solid var(--cinza-borda);color:var(--texto);margin-bottom:10px;}
.btn-success{background:var(--verde);color:#fff;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-ok{background:var(--verde-claro);color:var(--verde);}
.badge-nok{background:var(--vermelho-claro);color:var(--vermelho);}
.badge-pendente{background:#FEF3C7;color:#92400E;}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;}
.alert-warn{background:#FEF3C7;color:#92400E;}
.alert-info{background:var(--laranja-claro);color:var(--laranja2);}
.alert-success{background:var(--verde-claro);color:var(--verde);}
.alert-danger{background:var(--vermelho-claro);color:var(--vermelho);}
.cl-item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid #F0EDE8;font-size:12px;}
.cl-item-row:last-child{border-bottom:none;}
.ci-num{width:24px;text-align:center;color:var(--cinza);font-weight:700;font-size:11px;flex-shrink:0;}
.ci-nome{flex:1;line-height:1.3;}
.ci-status{flex-shrink:0;}
.tab-bar{display:flex;background:var(--branco);border-bottom:1px solid var(--cinza-borda);margin-bottom:16px;overflow-x:auto;}
.tab-btn{padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--cinza);border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;}
.tab-btn.active{color:var(--laranja);border-bottom-color:var(--laranja);}
.checklist-card{background:var(--branco);border:1.5px solid var(--cinza-borda);border-radius:12px;padding:14px;margin-bottom:12px;cursor:pointer;transition:all .15s;}
.checklist-card:active{transform:scale(.98);}
.checklist-card.nok{border-left:4px solid var(--vermelho);}
.checklist-card.ok{border-left:4px solid var(--verde);}
.checklist-card.pendente{border-left:4px solid var(--laranja);}
.cc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.cc-titulo{font-size:14px;font-weight:700;}
.cc-info{font-size:11px;color:var(--texto-sec);margin-top:3px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--branco);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px;}
.sig-box{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.sig-label-top{font-size:12px;font-weight:700;color:var(--texto-sec);text-transform:uppercase;letter-spacing:.4px;}
.sig-canvas-wrap{border:1.5px dashed var(--cinza-borda);border-radius:8px;background:#FAFAF8;}
canvas.sig-canvas{display:block;width:100%;height:110px;cursor:crosshair;touch-action:none;}
.sig-name-label{font-size:12px;color:var(--laranja);text-align:center;padding:3px;border-top:1px solid var(--cinza-borda);font-weight:500;}
.sig-clear{font-size:11px;color:var(--texto-sec);cursor:pointer;background:none;border:none;padding:0;text-align:right;display:block;margin-top:2px;font-family:inherit;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--laranja2);padding:20px;}
.login-box{background:var(--branco);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.login-logo{text-align:center;margin-bottom:16px;}
.login-logo img{height:48px;object-fit:contain;}
.login-title{text-align:center;font-size:18px;font-weight:700;color:var(--laranja);margin-bottom:4px;}
.login-sub{text-align:center;font-size:13px;color:var(--cinza);margin-bottom:20px;}
.login-err{color:var(--vermelho);font-size:13px;text-align:center;margin-top:10px;display:none;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.info-cell{background:var(--cinza-claro);border-radius:8px;padding:8px 10px;}
.info-cell-label{font-size:10px;color:var(--texto-sec);font-weight:700;text-transform:uppercase;}
.info-cell-val{font-size:13px;font-weight:700;color:var(--texto);margin-top:2px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo"><img src="/Med+.png" alt="med+ Group"></div>
    <div class="login-title">Portal do Chefe</div>
    <div class="login-sub">med+ Group — SCI Cuiabá</div>
    <div class="form-group"><label>Equipe</label>
      <select id="li-equipe">
        <option value="">Selecione sua equipe...</option>
        <option value="Alfa">Equipe Alfa — Cerqueira</option>
        <option value="Bravo">Equipe Bravo — Savio</option>
        <option value="Charlie">Equipe Charlie — Cleber</option>
        <option value="Delta">Equipe Delta — Douglas</option>
      </select>
    </div>
    <div class="form-group"><label>Senha</label>
      <input type="password" id="li-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" id="btn-login">Entrar</button>
    <div class="login-err" id="login-err">Equipe ou senha incorretos</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header>
    <div class="header-logo"><img src="/Med+.png" alt="med+ Group"></div>
    <div class="header-info">
      <div class="header-title">Portal do Chefe de Equipe</div>
      <div class="header-sub" id="hdr-sub">med+ Group</div>
    </div>
    <div class="header-right">
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('pendentes',this)">⏳ Pendentes</button>
    <button class="tab-btn" onclick="showTab('aprovados',this)">✅ Aprovados</button>
    <button class="tab-btn" onclick="showTab('todos',this)">📋 Todos</button>
  </div>

  <div class="page">
    <div id="lista-checklists">
      <div style="text-align:center;padding:40px;color:var(--cinza);">Carregando...</div>
    </div>
  </div>
</div>

<!-- MODAL: ver checklist -->
<div class="modal-overlay" id="modal-cl">
  <div class="modal">
    <div class="modal-title" id="modal-titulo">Checklist</div>
    <div class="info-grid" id="modal-info"></div>
    <div id="modal-nc-aviso"></div>
    <div id="modal-itens" style="max-height:30vh;overflow-y:auto;border:1px solid var(--cinza-borda);border-radius:10px;padding:8px;margin-bottom:14px;"></div>
    <div id="modal-obs"></div>

    <!-- Assinatura do motorista/BA (só visualização) -->
    <div style="margin-bottom:14px;">
      <div class="sig-label-top" id="modal-sig-mot-label">ASSINATURA DO PREENCHEDOR</div>
      <div style="border:1px solid var(--cinza-borda);border-radius:8px;padding:8px;background:#FAFAF8;min-height:60px;display:flex;align-items:center;justify-content:center;">
        <img id="modal-sig-mot-img" src="" style="max-height:55px;display:none;">
        <span id="modal-sig-mot-vazio" style="color:var(--cinza);font-size:12px;">Sem assinatura</span>
      </div>
      <div class="sig-name-label" id="modal-sig-mot-nome">—</div>
    </div>

    <!-- Assinatura do CHEFE -->
    <div class="sig-box" id="sig-chefe-box">
      <div class="sig-label-top">✍️ VISTO CHEFE DE EQUIPE</div>
      <div class="sig-canvas-wrap" id="sig-canvas-wrap">
        <canvas class="sig-canvas" id="canvas-chefe-modal"></canvas>
      </div>
      <div class="sig-name-label" id="modal-sig-chefe-nome">—</div>
      <button class="sig-clear" onclick="clearCanvas('canvas-chefe-modal')">Limpar assinatura</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px;">
      <button class="btn btn-success" id="btn-aprovar" onclick="aprovarChecklist()">✅ Aprovar e Assinar</button>
      <button class="btn btn-outline" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>

<script>
const SENHAS = { Alfa:'alfa123', Bravo:'bravo123', Charlie:'charlie123', Delta:'delta123' };
const CHEFES = { Alfa:'Cerqueira', Bravo:'Savio', Charlie:'Cleber', Delta:'Douglas' };

let ME = { equipe:'', chefe:'' };
let todosChecklists = [];
let clAtual = null;
let tabAtual = 'pendentes';
let canvasIniciado = false;

function doLogin() {
  const equipe = document.getElementById('li-equipe').value;
  const senha  = document.getElementById('li-senha').value;
  const err    = document.getElementById('login-err');
  err.style.display='none';
  if(!equipe){err.textContent='Selecione a equipe.';err.style.display='block';return;}
  if(senha !== SENHAS[equipe]){err.textContent='Senha incorreta.';err.style.display='block';return;}
  ME.equipe = equipe;
  ME.chefe  = CHEFES[equipe];
  localStorage.setItem('chefe_equipe', equipe);
  iniciarApp();
}

function iniciarApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hdr-sub').textContent = `Equipe ${ME.equipe} — Chefe: ${ME.chefe}`;
  document.getElementById('modal-sig-chefe-nome').textContent = ME.chefe;
  carregarChecklists();
}

function doLogout() {
  localStorage.removeItem('chefe_equipe');
  ME={equipe:'',chefe:''};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

const saved = localStorage.getItem('chefe_equipe');
if(saved && SENHAS[saved]) {
  ME.equipe = saved;
  ME.chefe  = CHEFES[saved];
  iniciarApp();
}

async function carregarChecklists() {
  document.getElementById('lista-checklists').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--cinza);">Carregando...</div>';
  try {
    const r = await fetch('/api/checklists/publico');
    const todos = await r.json();
    todosChecklists = todos.filter(c => {
      const equipeOk = c.equipe === ME.equipe || c.equipe === 'Equipe ' + ME.equipe;
      const chefeOk  = c.nome_chefe === ME.chefe;
      return equipeOk || chefeOk;
    });
    renderLista();
  } catch(e) {
    document.getElementById('lista-checklists').innerHTML =
      '<div class="alert alert-danger">Erro ao carregar. Tente novamente.</div>';
  }
}

function showTab(tab, el) {
  tabAtual = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderLista();
}

function renderLista() {
  let lista = [...todosChecklists];
  if(tabAtual==='pendentes') lista = lista.filter(c=>!c.aprovado_chefe);
  if(tabAtual==='aprovados') lista = lista.filter(c=>c.aprovado_chefe);
  lista.sort((a,b)=>(b.data||'')>(a.data||'')?1:-1);

  const el = document.getElementById('lista-checklists');
  if(!lista.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--cinza);">
      ${tabAtual==='pendentes'?'✅ Nenhum checklist pendente!':'Nenhum registro encontrado.'}
    </div>`;
    return;
  }

  el.innerHTML = lista.map(c => {
    const isPendente = !c.aprovado_chefe;
    const cls = isPendente ? 'pendente' : c.status==='ok' ? 'ok' : 'nok';
    const badge = isPendente
      ? '<span class="badge badge-pendente">⏳ Aguarda aprovação</span>'
      : '<span class="badge badge-ok">✅ Aprovado</span>';
    const tipoLabel = c.preenchidoPor==='nome_guerra_ba2'?'🔧 BA-2':
                      c.preenchidoPor==='lider_resgate'?'👑 Líder':'🚗 Motorista';
    return `<div class="checklist-card ${cls}" onclick="abrirChecklist(${c.id})">
      <div class="cc-header">
        <div>
          <div class="cc-titulo">${c.formulario_titulo||'Checklist'}</div>
          <div class="cc-info">📅 ${c.data||'—'} • 🚒 ${c.placa} • 👤 ${c.nome||'—'} ${tipoLabel}</div>
          <div class="cc-info">👥 Equipe ${c.equipe||'—'}</div>
        </div>
        ${badge}
      </div>
    </div>`;
  }).join('');
}

async function abrirChecklist(id) {
  const c = todosChecklists.find(x=>x.id==id);
  if(!c) return;
  clAtual = c;
  canvasIniciado = false;

  const tipoLabel = c.preenchidoPor==='nome_guerra_ba2'?'BA-2':
                    c.preenchidoPor==='lider_resgate'?'Líder de Resgate':'Motorista';

  document.getElementById('modal-titulo').textContent = c.formulario_titulo||'Checklist';
  document.getElementById('modal-info').innerHTML = `
    <div class="info-cell"><div class="info-cell-label">Viatura</div><div class="info-cell-val">${c.placa}</div></div>
    <div class="info-cell"><div class="info-cell-label">Data</div><div class="info-cell-val">${c.data||'—'}</div></div>
    <div class="info-cell"><div class="info-cell-label">${tipoLabel}</div><div class="info-cell-val">${c.nome||'—'}</div></div>
    <div class="info-cell"><div class="info-cell-label">Equipe</div><div class="info-cell-val">${c.equipe||'—'}</div></div>`;

  const ncEl = document.getElementById('modal-nc-aviso');
  ncEl.innerHTML = (c.nc>0)
    ? `<div class="alert alert-warn">⚠ ${c.nc} item(ns) Não Conforme(s)</div>`
    : `<div class="alert alert-success">✅ Todos os itens conformes</div>`;

  const itens = c.itens||{};
  document.getElementById('modal-itens').innerHTML = Object.values(itens).map(v=>{
    const ic = v.status==='C'?'✅':v.status==='NC'?'❌':'➖';
    const st = v.status==='NC'?'color:var(--vermelho);background:#FFF5F5;border-radius:6px;':
               v.status==='NA'?'color:var(--cinza);':'';
    return `<div class="cl-item-row" style="${st}">
      <span class="ci-num">${v.num||''}</span>
      <span class="ci-nome">${ic} ${v.item||''}</span>
      <span class="ci-status"><strong>${v.status||'—'}</strong></span>
    </div>`;
  }).join('') || '<div style="color:var(--cinza);font-size:13px;padding:10px;">Sem itens</div>';

  const obsEl = document.getElementById('modal-obs');
  obsEl.innerHTML = c.obs
    ? `<div class="alert alert-warn" style="margin-bottom:14px;">📝 ${c.obs}</div>` : '';

  const motLabel = c.preenchidoPor==='nome_guerra_ba2'?'ASSINATURA BA-2':
                   c.preenchidoPor==='lider_resgate'?'ASSINATURA LÍDER':'ASSINATURA MOTORISTA';
  document.getElementById('modal-sig-mot-label').textContent = motLabel;
  const sigImg   = document.getElementById('modal-sig-mot-img');
  const sigVazio = document.getElementById('modal-sig-mot-vazio');

  // ✅ Suporta URL do Cloudinary e base64
  if(c.sigMotorista && (c.sigMotorista.startsWith('http') || c.sigMotorista.length > 100)) {
    sigImg.src = c.sigMotorista;
    sigImg.style.display='block';
    sigVazio.style.display='none';
  } else {
    sigImg.style.display='none';
    sigVazio.style.display='block';
  }
  document.getElementById('modal-sig-mot-nome').textContent = c.nome||'—';

  const btnAprovar = document.getElementById('btn-aprovar');
  const sigBox     = document.getElementById('sig-chefe-box');
  if(c.aprovado_chefe) {
    btnAprovar.style.display='none';
    sigBox.style.display='none';
  } else {
    btnAprovar.style.display='block';
    sigBox.style.display='block';
  }

  document.getElementById('modal-cl').classList.add('open');

  if(!c.aprovado_chefe) {
    setTimeout(() => {
      initCanvas('canvas-chefe-modal');
      canvasIniciado = true;
    }, 400);
  }
}

function fecharModal() {
  document.getElementById('modal-cl').classList.remove('open');
  clAtual = null;
  canvasIniciado = false;
}

async function aprovarChecklist() {
  if(!clAtual) return;
  const btn = document.getElementById('btn-aprovar');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Aprovando...';

  const canvas = document.getElementById('canvas-chefe-modal');
  // ✅ PNG para assinatura sem fundo preto
  const sigChefe = canvas.toDataURL('image/png');

  try {
    const r = await fetch(`/api/checklists/${clAtual.id}/aprovar`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        aprovado_chefe: true,
        chefe: ME.chefe,
        equipe_chefe: ME.equipe,
        sigChefe: sigChefe,
        data_aprovacao: new Date().toISOString()
      })
    });
    if(!r.ok) throw new Error('Erro ao aprovar');
    const idx = todosChecklists.findIndex(c=>c.id==clAtual.id);
    if(idx>=0) {
      todosChecklists[idx].aprovado_chefe = true;
      todosChecklists[idx].sigChefe = sigChefe;
      todosChecklists[idx].chefe = ME.chefe;
    }
    fecharModal();
    renderLista();
  } catch(e) {
    alert('Erro: '+e.message);
  } finally {
    btn.disabled=false;
    btn.innerHTML='✅ Aprovar e Assinar';
  }
}

function initCanvas(id) {
  const c = document.getElementById(id);
  if(!c) return;
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = c.offsetWidth;
  const h = 110;
  c.width  = w * dpr;
  c.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#E8520A';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  const novo = c.cloneNode(true);
  c.parentNode.replaceChild(novo, c);
  const nc = document.getElementById(id);
  const nctx = nc.getContext('2d');
  nctx.scale(dpr, dpr);
  nctx.strokeStyle = '#E8520A';
  nctx.lineWidth   = 2.5;
  nctx.lineCap     = 'round';
  nctx.lineJoin    = 'round';
  let drawing = false, lx, ly;
  function pos(e) {
    const r = nc.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return [s.clientX - r.left, s.clientY - r.top];
  }
  nc.addEventListener('mousedown',  e=>{drawing=true;[lx,ly]=pos(e);});
  nc.addEventListener('touchstart', e=>{e.preventDefault();drawing=true;[lx,ly]=pos(e);},{passive:false});
  nc.addEventListener('mousemove',  e=>{if(!drawing)return;const[x,y]=pos(e);nctx.beginPath();nctx.moveTo(lx,ly);nctx.lineTo(x,y);nctx.stroke();[lx,ly]=[x,y];});
  nc.addEventListener('touchmove',  e=>{e.preventDefault();if(!drawing)return;const[x,y]=pos(e);nctx.beginPath();nctx.moveTo(lx,ly);nctx.lineTo(x,y);nctx.stroke();[lx,ly]=[x,y];},{passive:false});
  ['mouseup','mouseleave','touchend'].forEach(ev=>nc.addEventListener(ev,()=>drawing=false));
}

function clearCanvas(id) {
  const c = document.getElementById(id);
  if(!c) return;
  const dpr = window.devicePixelRatio||1;
  c.getContext('2d').clearRect(0,0,c.width,c.height);
