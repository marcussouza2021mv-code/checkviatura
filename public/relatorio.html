<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Inspeção Viaturas — med+ Group</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Arial',sans-serif;background:#f0f0f0;color:#000;}

/* TELA - filtros */
.no-print{background:#fff;padding:16px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;border-bottom:2px solid #E8520A;margin-bottom:20px;}
.no-print label{font-size:11px;font-weight:700;text-transform:uppercase;display:block;margin-bottom:4px;color:#555;}
.no-print select,.no-print input{padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit;}
.btn{padding:9px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.btn-gerar{background:#E8520A;color:#fff;}
.btn-pdf{background:#111;color:#fff;}
.btn-voltar{background:transparent;border:1px solid #ccc;color:#333;}

/* FOLHA A4 */
.folha{width:297mm;min-height:210mm;background:#fff;margin:0 auto 20px;padding:6mm;font-size:7.5pt;box-shadow:0 2px 12px rgba(0,0,0,.15);}

/* CABEÇALHO */
.cab-wrap{display:flex;border:1px solid #000;margin-bottom:0;}
.cab-logo{width:35mm;border-right:1px solid #000;display:flex;align-items:center;justify-content:center;padding:4px;}
.cab-logo-inner{text-align:center;}
.cab-logo-inner .med{font-size:18pt;font-weight:900;line-height:1;}
.cab-logo-inner .plus{color:#E8520A;font-size:18pt;font-weight:900;}
.cab-logo-inner .group{font-size:7pt;letter-spacing:1px;margin-top:2px;}
.cab-titulo{flex:1;display:flex;align-items:center;justify-content:center;border-right:1px solid #000;padding:4px;}
.cab-titulo-text{font-size:11pt;font-weight:700;text-align:center;}
.cab-codigo{width:45mm;font-size:7pt;}
.cab-codigo-row{padding:3px 6px;border-bottom:1px solid #000;display:flex;justify-content:space-between;}
.cab-codigo-row:last-child{border-bottom:none;}
.cab-codigo-row span{font-weight:700;}

/* INSTRUÇÃO */
.instrucao{border:1px solid #000;border-top:none;padding:4px 6px;font-size:6.5pt;line-height:1.4;}

/* REFERÊNCIA */
.referencia{border:1px solid #000;border-top:none;display:flex;align-items:center;padding:3px 8px;gap:20px;font-size:7.5pt;font-weight:700;}

/* INFO BAR */
.info-bar{border:1px solid #000;border-top:none;display:flex;font-size:7.5pt;}
.info-cell{padding:3px 6px;border-right:1px solid #000;display:flex;gap:4px;align-items:center;}
.info-cell:last-child{border-right:none;}
.info-cell b{font-weight:700;}

/* TABELA */
.tab-wrap{border:1px solid #000;border-top:none;overflow:hidden;}
table.cl{width:100%;border-collapse:collapse;table-layout:fixed;}
.cl th,.cl td{border:0.5px solid #999;text-align:center;padding:1px;font-size:6.5pt;overflow:hidden;}
.cl th.th-num{width:6mm;background:#dce3f0;font-weight:700;}
.cl th.th-item{text-align:left;padding:2px 4px;background:#dce3f0;font-weight:700;width:52mm;}
.cl th.th-dia{width:6.5mm;background:#dce3f0;font-weight:700;font-size:6pt;}
.cl td.td-num{background:#f5f5f5;font-weight:700;color:#555;}
.cl td.td-item{text-align:left;padding:2px 4px;font-size:6pt;white-space:normal;line-height:1.2;}
.cl td.td-c{color:#1a6b1a;font-weight:700;}
.cl td.td-nc{color:#9B1C1C;font-weight:700;background:#FEE2E2;}
.cl td.td-na{color:#6B7280;}
.cl td.td-vazio{color:#ddd;}
.cl td.td-futuro{color:#e0e0e0;background:#fafafa;}
.cl tr.tr-assin td{height:14mm;vertical-align:bottom;padding:1px;}
.cl tr.tr-assin td.td-item{font-size:6pt;color:#555;font-style:italic;vertical-align:middle;}
.cl tr.tr-nome td{font-size:5.5pt;color:#444;border-top:0.5px solid #aaa;padding:1px;}
.cl tr.tr-nome td.td-item{font-style:italic;color:#555;}

/* ASSINATURA IMG */
.sig-img{max-width:100%;max-height:12mm;object-fit:contain;display:block;margin:0 auto;}

/* RODAPÉ */
.rodape{border:1px solid #000;border-top:none;display:flex;}
.rod-obs{flex:1;border-right:1px solid #000;padding:4px 6px;}
.rod-obs-title{font-size:6.5pt;font-weight:700;margin-bottom:2px;}
.rod-obs-text{font-size:6.5pt;min-height:14mm;}
.rod-chefe{width:50mm;padding:4px 6px;}
.rod-chefe-title{font-size:6.5pt;font-weight:700;margin-bottom:2px;text-align:center;}
.rod-chefe-sig{min-height:14mm;border:0.5px dashed #aaa;border-radius:4px;margin-bottom:2px;}
.rod-chefe-nome{font-size:6pt;text-align:center;border-top:0.5px solid #aaa;padding-top:2px;}

/* CÓDIGO RODAPÉ */
.cod-rodape{border:1px solid #000;border-top:none;display:flex;justify-content:space-between;padding:2px 6px;font-size:6pt;color:#555;}

@media print{
  body{background:#fff;}
  .no-print{display:none!important;}
  .folha{box-shadow:none;margin:0;padding:6mm;width:100%;}
  @page{size:A4 landscape;margin:0;}
}
</style>
</head>

async function gerar(){
  const viatura = document.getElementById('sel-viatura').value;
  const tipo    = document.getElementById('sel-tipo').value;
  const mes     = document.getElementById('sel-mes').value;
  if(!viatura){alert('Selecione a viatura!');return;}
  if(!mes){alert('Selecione o mês!');return;}

  const saida = document.getElementById('saida');
  saida.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Carregando...</div>';

  const r = await fetch('/api/checklists/publico');
  const todos = await r.json();

  const filtrados = todos.filter(c =>
    c.placa === viatura &&
    c.formulario_id && c.formulario_id.includes(
      tipo==='nome_guerra_ba2'?'ba':tipo==='lider_resgate'?'equipamentos':'motorista'
    ) && c.mes === mes
  );

  const porDia = {};
  filtrados.forEach(c => {
    const d = String(parseInt(c.dia)).padStart(2,'0');
    if(!porDia[d]) porDia[d]=c;
  });

  const [ano,mesNum] = mes.split('-').map(Number);
  const totalDias = new Date(ano,mesNum,0).getDate();
  const hoje = new Date();
  const diaHoje = (ano===hoje.getFullYear()&&mesNum===hoje.getMonth()+1)?hoje.getDate():totalDias;
  const dias = Array.from({length:totalDias},(_,i)=>String(i+1).padStart(2,'0'));
  const itens = (ITENS[viatura]&&ITENS[viatura][tipo])||[];
  const mesLabel = MESES[mesNum-1].toUpperCase()+' / '+ano;
  const obs = filtrados.map(c=>c.obs).filter(Boolean).join(' | ') || '';

  // Monta tabela
  let thDias = dias.map(d=>`<th class="th-dia" style="${parseInt(d)>diaHoje?'color:#ccc':''}">${parseInt(d)}</th>`).join('');
  let tdAssin = dias.map(d=>{
    const c = porDia[d];
    const fut = parseInt(d)>diaHoje;
    if(fut) return `<td class="td-futuro"></td>`;
    if(!c)  return `<td></td>`;
    const sig = c.sigMotorista||'';
    return `<td style="padding:1px;">${sig?`<img class="sig-img" src="${sig}">`:'<div style="height:12mm;"></div>'}</td>`;
  }).join('');
  let tdNome = dias.map(d=>{
    const c = porDia[d];
    const fut = parseInt(d)>diaHoje;
    if(fut) return `<td class="td-futuro"></td>`;
    if(!c)  return `<td></td>`;
    return `<td style="font-size:5pt;overflow:hidden;">${(c.nome||'').substring(0,8)}</td>`;
  }).join('');

  let linhas = itens.map((item,idx)=>{
    let tds = dias.map(d=>{
      const c = porDia[d];
      const fut = parseInt(d)>diaHoje;
      if(fut) return `<td class="td-futuro">—</td>`;
      if(!c)  return `<td class="td-vazio"></td>`;
      const st = c.itens?.[`item-${idx}`]?.status;
      if(st==='C')  return `<td class="td-c">C</td>`;
      if(st==='NC') return `<td class="td-nc">NC</td>`;
      if(st==='NA') return `<td class="td-na">NA</td>`;
      return `<td class="td-vazio">-</td>`;
    }).join('');
    return `<tr><td class="td-num">${idx+1}</td><td class="td-item">${item}</td>${tds}</tr>`;
  }).join('');

  saida.innerHTML = `
  <div class="folha">
    <div class="cab-wrap">
      <div class="cab-logo">
        <div class="cab-logo-inner">
          <div><span class="med">med</span><span class="plus">+</span></div>
          <div class="group">Group</div>
        </div>
      </div>
      <div class="cab-titulo">
        <div>
          <div style="font-size:7pt;text-align:center;margin-bottom:2px;">FORMULÁRIO</div>
          <div class="cab-titulo-text">Checklist Inspeção Viaturas</div>
        </div>
      </div>
      <div class="cab-codigo">
        <div class="cab-codigo-row"><span>CÓDIGO:</span> MMS.BR.BA.FOR.007</div>
        <div class="cab-codigo-row"><span>VERSÃO:</span> C0 &nbsp;&nbsp; <span>DATA CRIAÇÃO:</span> 06//2025</div>
      </div>
    </div>

    <div class="instrucao">
      Para correto preenchimento deverá ser assinalado com "C" os itens que se mostram satisfatórios (conforme), caso o item apresente alguma avaria/não conformidade assinalar com NC (não conforme). Quando o item não faz parte da viatura deverá ser anotado NA (não aplicável). Para todos os itens NC o chefe de equipe responsável deverá ser comunicado e o campo anotações gerais avaria no final do formulário deverá ser preenchido com a descrição da avaria.
    </div>

    <div class="referencia">
      <span>REFERÊNCIA PARA PREENCHIMENTO:</span>
      <span>C- CONFORME</span>
      <span>NC-NÃO CONFORME</span>
      <span>NA- NÃO APLICÁVEL/NÃO EXISTENTE</span>
    </div>

    <div class="info-bar">
      <div class="info-cell"><b>SCI:</b> CUIABÁ</div>
      <div class="info-cell"><b>CCI:</b> ${CCI[viatura]||'—'}</div>
      <div class="info-cell"><b>VIATURA:</b> ${viatura}</div>
      <div class="info-cell"><b>MODELO:</b> ${MODELO[viatura]||'—'}</div>
      <div class="info-cell" style="flex:1;"><b>MÊS E ANO:</b> ${mesLabel}</div>
    </div>

    <div class="tab-wrap">
      <table class="cl">
        <thead>
          <tr>
            <th class="th-num">#</th>
            <th class="th-item">ITEM A INSPECIONAR</th>
            <th colspan="${totalDias}" style="background:#dce3f0;font-size:7pt;font-weight:700;padding:2px;">COMPONENTES</th>
          </tr>
          <tr>
            <th class="th-num"></th>
            <th class="th-item"></th>
            ${thDias}
          </tr>
        </thead>
        <tbody>
          ${linhas}
          <tr class="tr-assin">
            <td class="td-num"></td>
            <td class="td-item" style="font-size:6pt;color:#555;">${TIPO_LABEL[tipo]}</td>
            ${tdAssin}
          </tr>
          <tr class="tr-nome">
            <td class="td-num"></td>
            <td class="td-item">Nome de Guerra / Por Extenso</td>
            ${tdNome}
          </tr>
        </tbody>
      </table>
    </div>

    <div class="rodape">
      <div class="rod-obs">
        <div class="rod-obs-title">ALTERAÇÕES E OBSERVAÇÕES (QUALQUER ALTERAÇÃO DISCRIMINAR ABAIXO):</div>
        <div class="rod-obs-text">${obs}</div>
      </div>
      <div class="rod-chefe">
        <div class="rod-chefe-title">VISTO CHEFE DE EQUIPE</div>
        <div class="rod-chefe-sig"></div>
        <div class="rod-chefe-nome">Nome do Chefe de Equipe</div>
      </div>
    </div>

    <div class="cod-rodape">
      <span>MMS.BR.BA.FOR.007 Rev.00</span>
      <span>Impresso em: ${new Date().toLocaleDateString('pt-BR')} ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>
    </div>
  </div>`;
}
</script>
</body>
</html>
